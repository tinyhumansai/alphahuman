name: Type Check

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Type Check TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: "yarn"

      - name: Cache node modules
        id: yarn-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-typecheck-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-typecheck-
            ${{ runner.os }}-test-
            ${{ runner.os }}-build-

      - name: Install dependencies
        if: steps.yarn-cache.outputs.cache-hit != 'true'
        run: yarn install --frozen-lockfile

      - name: Type check TypeScript files
        run: yarn workspace openhuman-app compile
        env:
          NODE_ENV: test

      - name: Check Prettier formatting
        run: yarn workspace openhuman-app format:check
        env:
          NODE_ENV: test

      - name: Run ESLint
        run: yarn workspace openhuman-app lint
        env:
          NODE_ENV: test

  rust-quality:
    name: Rust Quality (fmt + clippy)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Rust (rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@1.93.0
        with:
          components: rustfmt, clippy

      - name: Install Tauri build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf mold clang

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          cache-on-failure: true

      - name: Check formatting (cargo fmt)
        run: cargo fmt --all -- --check
        env:
          RUSTC_WRAPPER: ""

      - name: Run clippy (core crate)
        run: cargo clippy -p openhuman
