id = "skills_agent"
display_name = "Skills Agent"
when_to_use = "Skill tool specialist — executes installed QuickJS skill tools (Notion, Gmail, …). Use when the task should be completed via a user-installed skill rather than raw HTTP/file I/O. Pair with a `skill_filter` argument to scope to a single skill."
temperature = 0.4
max_iterations = 10
sandbox_mode = "none"
omit_identity = true
omit_memory_context = true
omit_safety_preamble = false
omit_skills_catalog = true
category_filter = "skill"

[model]
hint = "agentic"

[tools]
wildcard = {}
